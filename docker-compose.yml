services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: truss
      POSTGRES_USER: truss
      POSTGRES_PASSWORD: truss_dev
    # Ports are intentionally not exposed to the host.
    # To connect with a local DB client, add "- 5432:5432" here temporarily.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truss"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Ports are intentionally not exposed to the host.
    # To inspect with redis-cli, add "- 6379:6379" here temporarily.

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://truss:truss_dev@postgres:5432/truss
      AUTH_PROVIDER: local
      STORAGE_PROVIDER: local
      LOCAL_JWT_SECRET: docker-compose-dev-only-secret-change-for-production
      LOCAL_STORAGE_PATH: /app/data/uploads
      REDIS_URL: redis://redis:6379
      BACKEND_CORS_ORIGINS: http://localhost,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - uploads_data:/app/data/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_PROVIDER: local
        VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
